<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Área Privada</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Inter',sans-serif;
      background:#070B14;
      color:#fff;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      overflow-x:hidden;
      position:relative;
    }

    body::before{
      content:'';
      position:absolute;
      width:300px;
      height:300px;
      background:rgba(0,255,255,0.15);
      filter:blur(120px);
      top:-100px;
      left:-100px;
      border-radius:50%;
    }

    body::after{
      content:'';
      position:absolute;
      width:300px;
      height:300px;
      background:rgba(140,82,255,0.15);
      filter:blur(120px);
      bottom:-100px;
      right:-100px;
      border-radius:50%;
    }

    .container{
      width:100%;
      max-width:420px;
      position:relative;
      z-index:2;
    }

    .card{
      background:rgba(255,255,255,0.05);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:32px;
      overflow:hidden;
      backdrop-filter:blur(20px);
      box-shadow:0 20px 50px rgba(0,0,0,0.45);
    }

    .preview{
      position:relative;
      height:420px;
      overflow:hidden;
    }

    .preview img{
      width:100%;
      height:100%;
      object-fit:cover;
      filter:blur(2px);
      transform:scale(1.05);
    }

    .overlay{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,0.45);
    }

    .badge{
      position:absolute;
      top:18px;
      left:18px;
      background:rgba(0,0,0,0.4);
      border:1px solid rgba(255,255,255,0.1);
      backdrop-filter:blur(10px);
      padding:10px 16px;
      border-radius:999px;
      font-size:13px;
      font-weight:600;
    }

    .online{
      position:absolute;
      top:18px;
      right:18px;
      background:rgba(0,255,120,0.12);
      border:1px solid rgba(0,255,120,0.2);
      color:#8dffb5;
      backdrop-filter:blur(10px);
      padding:10px 16px;
      border-radius:999px;
      font-size:13px;
      font-weight:600;
      display:flex;
      align-items:center;
      gap:8px;
    }

    .dot{
      width:8px;
      height:8px;
      background:#00ff88;
      border-radius:50%;
      animation:pulse 1.5s infinite;
    }

    @keyframes pulse{
      0%{opacity:1;}
      50%{opacity:.3;}
      100%{opacity:1;}
    }

    .fade{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      height:160px;
      background:linear-gradient(to top,#070B14,transparent);
    }

    .content{
      margin-top:-60px;
      position:relative;
      z-index:5;
      padding:0 22px 26px;
    }

    .content-box{
      background:rgba(15,23,42,0.92);
      border:1px solid rgba(255,255,255,0.08);
      border-radius:26px;
      padding:28px;
      backdrop-filter:blur(20px);
    }

    h1{
      font-size:32px;
      line-height:1.1;
      text-align:center;
      font-weight:800;
    }

    .desc{
      text-align:center;
      color:rgba(255,255,255,0.65);
      margin-top:14px;
      font-size:14px;
      line-height:1.5;
    }

    .benefits{
      margin-top:24px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .benefit{
      display:flex;
      align-items:center;
      gap:12px;
      color:rgba(255,255,255,0.88);
      font-size:14px;
    }

    .benefit-dot{
      width:8px;
      height:8px;
      border-radius:50%;
      background:#22d3ee;
    }

    .captcha{
      margin-top:24px;
      background:#fff;
      color:#000;
      border-radius:22px;
      padding:18px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .captcha-left{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .captcha input{
      width:20px;
      height:20px;
      cursor:pointer;
    }

    .captcha-text{
      font-size:14px;
      font-weight:500;
    }

    .captcha-right{
      text-align:right;
      font-size:10px;
      color:#777;
      line-height:1.4;
    }

    .button{
      width:100%;
      border:none;
      margin-top:22px;
      background:linear-gradient(90deg,#22d3ee,#2563eb);
      color:#fff;
      padding:18px;
      border-radius:22px;
      font-size:15px;
      font-weight:700;
      cursor:pointer;
      transition:.25s;
      box-shadow:0 0 35px rgba(34,211,238,.35);
    }

    .button:hover{
      transform:scale(1.02);
    }

    .button:active{
      transform:scale(.98);
    }

    .proof{
      text-align:center;
      margin-top:18px;
      color:rgba(255,255,255,0.45);
      font-size:12px;
    }

    @media(max-width:480px){

      h1{
        font-size:28px;
      }

      .preview{
        height:380px;
      }

    }

  </style>
</head>

<body>

  <div class="container">

    <div class="card">

      <div class="preview">

        <!-- TROQUE A IMAGEM AQUI -->
        <img src="preview.jpg" alt="Preview">

        <div class="overlay"></div>

        <div class="badge">
          🔒 Área privada
        </div>

        <div class="online">
          <div class="dot"></div>
          1.284 online
        </div>

        <div class="fade"></div>

      </div>

      <div class="content">

        <div class="content-box">

          <h1>
            Conteúdo privado liberado
          </h1>

          <p class="desc">
            Vídeos exclusivos disponíveis apenas para maiores de 18 anos.
          </p>

          <div class="benefits">

            <div class="benefit">
              <div class="benefit-dot"></div>
              Acesso imediato
            </div>

            <div class="benefit">
              <div class="benefit-dot"></div>
              Atualizações diárias
            </div>

            <div class="benefit">
              <div class="benefit-dot"></div>
              Grupo privado no Telegram
            </div>

          </div>

          <div class="captcha">

            <div class="captcha-left">

              <input type="checkbox" id="check">

              <div class="captcha-text">
                Não sou um robô
              </div>

            </div>

            <div class="captcha-right">

  <img 
    src="https://www.gstatic.com/recaptcha/api2/logo_48.png"
    alt="reCAPTCHA"
    style="
      width:32px;
      margin-left:auto;
      display:block;
      margin-bottom:4px;
    "
  >

  <div><strong>reCAPTCHA</strong></div>
  <div>Privacidade - Termos</div>

</div>
          </div>

          <button class="button" id="enterBtn">
            SOU MAIOR DE 18 ANOS
          </button>

          <div class="proof">
            Mais de 12 mil acessos liberados hoje
          </div>

        </div>

      </div>

    </div>

  </div>

  <script>

    const button = document.getElementById('enterBtn');
    const check = document.getElementById('check');

    button.addEventListener('click', () => {

      if(!check.checked){
        alert('Confirme que você não é um robô.');
        return;
      }

      button.innerText = 'CLICAR E ASSISTIR';

      setTimeout(() => {

        // TROQUE PELO LINK DO SEU BOT
        window.location.href = 'https://t.me/secreto9vinhasbot';

      }, 800);

    });

  </script>

</body>
</html>
